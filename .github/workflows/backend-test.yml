name: Backend Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  test:
    name: Lint & Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "uv"

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync

      - name: Lint with ruff
        working-directory: ./backend
        run: uv run ruff check main.py
        continue-on-error: true

      - name: Format check
        working-directory: ./backend
        run: uv format --check main.py
        continue-on-error: true
